name: C++ CI Build

on:
  push:
    branches: [ master ]

jobs:
  build:

    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake ..

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Show workspace
      run: Get-ChildItem -Recurse

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: slidingwindow-exe
        path: build/**/*.exe
