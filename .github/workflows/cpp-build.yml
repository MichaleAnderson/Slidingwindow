name: C++ Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure Project
      run: |
        mkdir build
        cd build
        cmake ../sliding_window_duplicate

    - name: Build Project
      run: |
        cd build
        cmake --build . --config Release

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: SlidingWindowDuplicateExe
        path: build/Release/main_app.exe